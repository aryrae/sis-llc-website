<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8C97A"/>
      <stop offset="50%" style="stop-color:#D4A843"/>
      <stop offset="100%" style="stop-color:#B8922F"/>
    </linearGradient>
  </defs>

  <!-- Dark background circle -->
  <circle cx="50" cy="50" r="48" fill="#0A1628"/>

  <!-- Globe arcs -->
  <circle cx="50" cy="50" r="30" stroke="url(#goldGrad)" stroke-width="2" fill="none"/>
  <ellipse cx="50" cy="50" rx="30" ry="12" stroke="url(#goldGrad)" stroke-width="1.2" fill="none"/>
  <ellipse cx="50" cy="50" rx="12" ry="30" stroke="url(#goldGrad)" stroke-width="1.2" fill="none"/>

  <!-- Center diamond -->
  <rect x="44" y="44" width="12" height="12" rx="2" transform="rotate(45 50 50)" fill="url(#goldGrad)"/>
</svg>
